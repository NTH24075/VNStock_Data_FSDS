# =============================================================================
# Vietnam Stock Market Data Pipeline — Custom Docker Images
# =============================================================================
# Custom images (built from source):
#   - generator:          Python + vnstock + deps (./Dockerfile)
#   - spark-master/worker: bitnami/spark + delta-spark + pandas (docker/spark/)
#   - airflow-*:          apache/airflow + pyspark + deps (docker/airflow/)
#
# Off-the-shelf images (no custom code):
#   - postgres, minio, kafka, zookeeper, flink, trino
#
# Build all custom images:  docker compose build
# Start everything:          make up
# =============================================================================

x-common-env: &common-env
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  AWS_REGION: us-east-1
  POSTGRES_DSN: "postgresql://vendor:vendor@postgres:5432/vendor_db"

services:
  # ===========================================================================
  # Storage & Messaging
  # ===========================================================================

  postgres:
    image: postgres:16
    container_name: vnstock-postgres
    environment:
      POSTGRES_USER: vendor
      POSTGRES_PASSWORD: vendor
      POSTGRES_DB: vendor_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_vendor_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendor -d vendor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vnstock-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-create-buckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/landing-vendor-offline;
      mc mb --ignore-existing local/delta-lake;
      "

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vnstock-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: vnstock-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ===========================================================================
  # Generator (custom image)
  # ===========================================================================

  generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnstock-generator
    environment:
      <<: *common-env
      POSTGRES_DSN: "postgresql://vendor:vendor@postgres:5432/vendor_db"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    profiles:
      - generator

  # ===========================================================================
  # Compute
  # ===========================================================================

  spark-master:
    image: apache/spark:3.5.0
    container_name: vnstock-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/jobs
      - ./config:/opt/config

  spark-worker:
    image: apache/spark:3.5.0
    container_name: vnstock-spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4G
    volumes:
      - ./jobs:/opt/jobs
      - ./config:/opt/config

  flink-jobmanager:
    image: flink:1.18-scala_2.12
    container_name: vnstock-flink-jobmanager
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/opt/jobs

  flink-taskmanager:
    image: flink:1.18-scala_2.12
    container_name: vnstock-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
    volumes:
      - ./jobs:/opt/jobs

  # ===========================================================================
  # Orchestration
  # ===========================================================================

  airflow-webserver:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    image: vnstock-airflow:latest
    container_name: vnstock-airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://vendor:vendor@postgres/vendor_db"
      CONTRACTS_DIR: /opt/airflow/contracts
      SEED_PATH: /opt/airflow/seed/tickers_reference.json
      BRONZE_DIR: /opt/airflow/data/bronze
      SILVER_DIR: /opt/airflow/data/silver
      GOLD_DIR: /opt/airflow/data/gold
      DATA_DIR: /opt/airflow/data/landing
    ports:
      - "8082:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./contracts:/opt/airflow/contracts
      - ./generator/seed:/opt/airflow/seed
      - ./data:/opt/airflow/data
    command: webserver

  airflow-scheduler:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    image: vnstock-airflow:latest
    container_name: vnstock-airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://vendor:vendor@postgres/vendor_db"
      CONTRACTS_DIR: /opt/airflow/contracts
      SEED_PATH: /opt/airflow/seed/tickers_reference.json
      BRONZE_DIR: /opt/airflow/data/bronze
      SILVER_DIR: /opt/airflow/data/silver
      GOLD_DIR: /opt/airflow/data/gold
      DATA_DIR: /opt/airflow/data/landing
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./config:/opt/airflow/config
      - ./contracts:/opt/airflow/contracts
      - ./generator/seed:/opt/airflow/seed
      - ./data:/opt/airflow/data
    command: scheduler

  # ===========================================================================
  # Query Engine
  # ===========================================================================

  trino:
    image: trinodb/trino:latest
    container_name: vnstock-trino
    ports:
      - "8083:8080"
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog

volumes:
  postgres_data:
  minio_data:
