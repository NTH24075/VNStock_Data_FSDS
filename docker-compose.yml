# =============================================================================
# Vietnam Stock Market Data Pipeline — Custom Docker Images
# =============================================================================
# Custom images (built from source):
#   - generator:          Python + vnstock + deps (./Dockerfile)
#   - spark-master/worker: Apache Spark + Delta + pandas (docker/spark/)
#   - airflow-*:          apache/airflow + pyspark + deps (docker/airflow/)
#
# Off-the-shelf images (no custom code):
#   - postgres, minio, kafka, zookeeper, flink, trino
#
# Build all custom images:  docker compose build
# Start everything:          make up
# =============================================================================

x-common-env: &common-env
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  AWS_REGION: us-east-1
  POSTGRES_DSN: "postgresql://vendor:vendor@postgres:5432/vendor_db"
  KAFKA_BROKER: "kafka:29092"
  KAFKA_TOPIC: "stock_market_events_v3"

services:
  # ===========================================================================
  # Storage & Messaging
  # ===========================================================================

  postgres:
    image: postgres:16
    container_name: vnstock-postgres
    environment:
      POSTGRES_USER: vendor
      POSTGRES_PASSWORD: vendor
      POSTGRES_DB: vendor_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_vendor_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendor -d vendor_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vnstock-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-create-buckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/landing-vendor-offline;
      mc mb --ignore-existing local/delta-lake;
      "

  minio-sync-gold:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./data/gold:/source:ro
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
      mc mirror --overwrite --exclude '_checkpoints/*' --exclude '*.crc' /source local/delta-lake/gold;
      "
    profiles:
      - tools

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: vnstock-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: vnstock-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ===========================================================================
  # Generator (custom image)
  # ===========================================================================

  generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vnstock-generator
    environment:
      <<: *common-env
      POSTGRES_DSN: "postgresql://vendor:vendor@postgres:5432/vendor_db"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./docs/evidence:/app/docs/evidence
    profiles:
      - generator

  # ===========================================================================
  # Compute
  # ===========================================================================

  spark-master:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    image: vnstock-spark:3.5.3
    container_name: vnstock-spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      PYTHONPATH: /opt/project:/opt/spark/python/lib/pyspark.zip:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/project/jobs
      - ./generator:/opt/project/generator
      - ./tests:/opt/project/tests
      - ./config:/opt/project/config
      - ./data:/opt/project/data
      - ./contracts:/opt/project/contracts
      - ./generator/seed:/opt/project/generator/seed

  spark-worker:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    image: vnstock-spark:3.5.3
    container_name: vnstock-spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 4G
      PYTHONPATH: /opt/project:/opt/spark/python/lib/pyspark.zip:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
    volumes:
      - ./jobs:/opt/project/jobs
      - ./generator:/opt/project/generator
      - ./tests:/opt/project/tests
      - ./config:/opt/project/config
      - ./data:/opt/project/data
      - ./contracts:/opt/project/contracts
      - ./generator/seed:/opt/project/generator/seed

  # Standalone Spark driver used only for reproducible baseline/optimized UI
  # evidence. Start it through the Make targets below; the "capture" profile
  # keeps port 4040 free during normal pipeline operation.
  spark-capture:
    build:
      context: ./docker/spark
      dockerfile: Dockerfile
    image: vnstock-spark:3.5.3
    depends_on:
      - spark-master
      - spark-worker
    environment:
      PYTHONPATH: /opt/project:/opt/spark/python/lib/pyspark.zip:/opt/spark/python/lib/py4j-0.10.9.7-src.zip
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_DRIVER_HOST: spark-capture
      DATA_ROOT: /opt/project/data
    ports:
      - "4040:4040"
    volumes:
      - ./jobs:/opt/project/jobs
      - ./scripts:/opt/project/scripts
      - ./data:/opt/project/data
    command:
      - python3
      - /opt/project/scripts/spark_ui_capture.py
      - --mode
      - ${SPARK_CAPTURE_MODE:-baseline}
      - --hold-seconds
      - ${SPARK_CAPTURE_HOLD_SECONDS:-600}
      - --scale
      - ${SPARK_CAPTURE_SCALE:-4}
    profiles:
      - capture

  flink-jobmanager:
    build:
      context: ./docker/flink
      dockerfile: Dockerfile
    image: vnstock-flink:latest
    container_name: vnstock-flink-jobmanager
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - KAFKA_BROKER=kafka:29092
      - KAFKA_TOPIC=stock_market_events_v3
      - FLINK_OUTPUT_DIR=/opt/flink/data
    ports:
      - "8081:8081"
    volumes:
      - ./jobs:/opt/project/jobs
      - ./data/flink:/opt/flink/data

  flink-taskmanager:
    build:
      context: ./docker/flink
      dockerfile: Dockerfile
    image: vnstock-flink:latest
    container_name: vnstock-flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=flink-jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=4
    volumes:
      - ./jobs:/opt/project/jobs
      - ./data/flink:/opt/flink/data

  # ===========================================================================
  # Orchestration
  # ===========================================================================

  airflow-webserver:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    image: vnstock-airflow:latest
    container_name: vnstock-airflow-webserver
    # Match the Spark UID so both runtimes can safely update shared Delta paths.
    # The official Airflow image supports an arbitrary UID when the group is 0.
    user: "185:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PYTHONPATH: /opt/project:/opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: "1"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "1"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://vendor:vendor@postgres/vendor_db"
      CONTRACTS_DIR: /opt/project/contracts
      SEED_PATH: /opt/project/generator/seed/tickers_reference.json
      BRONZE_DIR: /opt/project/data/bronze
      SILVER_DIR: /opt/project/data/silver
      GOLD_DIR: /opt/project/data/gold
      DATA_DIR: /opt/project/data/landing
      SPARK_MASTER_URL: spark://spark-master:7077
    ports:
      - "8082:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/project/jobs
      - ./config:/opt/project/config
      - ./contracts:/opt/project/contracts
      - ./generator/seed:/opt/project/generator/seed
      - ./data:/opt/project/data
    command: webserver

  airflow-scheduler:
    build:
      context: ./docker/airflow
      dockerfile: Dockerfile
    image: vnstock-airflow:latest
    container_name: vnstock-airflow-scheduler
    user: "185:0"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      PYTHONPATH: /opt/project:/opt/airflow/dags
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__PARALLELISM: "1"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "1"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "postgresql+psycopg2://vendor:vendor@postgres/vendor_db"
      CONTRACTS_DIR: /opt/project/contracts
      SEED_PATH: /opt/project/generator/seed/tickers_reference.json
      BRONZE_DIR: /opt/project/data/bronze
      SILVER_DIR: /opt/project/data/silver
      GOLD_DIR: /opt/project/data/gold
      DATA_DIR: /opt/project/data/landing
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/project/jobs
      - ./config:/opt/project/config
      - ./contracts:/opt/project/contracts
      - ./generator/seed:/opt/project/generator/seed
      - ./data:/opt/project/data
    command: scheduler

  # ===========================================================================
  # Query Engine
  # ===========================================================================

  hive-metastore:
    image: apache/hive:4.0.1
    container_name: vnstock-hive-metastore
    environment:
      SERVICE_NAME: metastore
      HADOOP_CLASSPATH: /opt/hadoop/share/hadoop/tools/lib/hadoop-aws-3.3.6.jar:/opt/hadoop/share/hadoop/tools/lib/aws-java-sdk-bundle-1.12.367.jar
    volumes:
      - hive_metastore_data:/opt/hive/data/warehouse
      - ./docker/hive/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:latest
    container_name: vnstock-trino
    ports:
      - "8083:8080"
    volumes:
      - ./docker/trino/catalog:/etc/trino/catalog

volumes:
  postgres_data:
  minio_data:
  hive_metastore_data:
